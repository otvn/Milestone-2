<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form and Flexible Nav</title>
    <style>
        nav{
            display: flex;
            justify-content: space-between;
        }
        nav a{
            text-decoration: none;
            color: black;
        }
        .login-form{
            display: flex;
            flex-direction: column;
            width: 50%;
            border: 2px solid red;
            
        }
        .login-form input{
            margin-top: 20px;
        }
        .login-form-container{
            display: flex;
            justify-content: center;
            border: 2px solid purple;
        }
    </style>
</head>

<body>
    <nav>
        <div>
            <a href="">Home</a>
            <a href="">Profile</a>
            <a href="">Blog</a>
            <a href="">About</a>
        </div>

       <a href="">Log in</a> 
    </nav>
    <section class="login-form-container">
        <form  class="login-form">
            <h3>Please Log in</h3>
            <input type="email" placeholder="Your Email" name="" id="" required>
           <input type="password" placeholder="Your Password" name="" id="">
           <input type="submit" value="Login">
        </form>
    </section>

</body>
</html>
